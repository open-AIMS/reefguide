packages:
  - packages/*

catalog:
  '@sentry/node': '^10.53.1'
  '@types/express': '^4.17.25'
  '@types/node': '^24.12.3'
  axios: '~1.15.2'
  dotenv: '^16.6.1'
  express: '^4.22.1'
  ol: '^10.9.0'
  prettier: '^3.8.3'
  tsx: '^4.22.0'
  tsup: '^8.5.1'
  typescript: '~5.9.3'
  vitest: '^4.1.6'
  zod: '^3.25.76'

minimumReleaseAge: 2880

trustPolicy: 'no-downgrade'
trustPolicyIgnoreAfter: 17280

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  bcrypt: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  prisma: true
  unrs-resolver: true
