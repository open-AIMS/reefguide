packages:
  - packages/*

catalog:
  '@types/node': '^24.12.3'
  typescript: '~5.9.3'
  ts-node: '^10.9.2'
  ts-node-dev: '^2.0.0'
  zod: '^3.25.76'
  axios: '^1.13.2'
  express: '^4.21.2'
  '@types/express': '^4.17.23'
  dotenv: '^16.6.1'
  ol: '^10.9.0'
  prettier: '^3.6.2'

minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@angular/*'
  - '@angular-devkit/*'
  - '@ngtools/webpack'
  - '@schematics/angular'

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - prisma
  - unrs-resolver
