packages:
  - packages/*

catalog:
  '@types/express': '^4.17.25'
  '@types/node': '^24.12.3'
  axios: '~1.15.2'
  dotenv: '^16.6.1'
  express: '^4.22.1'
  ol: '^10.9.0'
  prettier: '^3.8.3'
  ts-node: '^10.9.2'
  ts-node-dev: '^2.0.0'
  typescript: '~5.9.3'
  zod: '^3.25.76'

minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@angular/*'
  - '@angular-devkit/*'
  - '@ngtools/webpack'
  - '@schematics/angular'
allowBuilds:
  '@parcel/watcher': set this to true or false
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': set this to true or false
  bcrypt: set this to true or false
  esbuild: true
  lmdb: set this to true or false
  msgpackr-extract: set this to true or false
  prisma: true
  unrs-resolver: true
