name: Code Formatting Check
on:
  pull_request:
    branches: [main]
jobs:
  format-check:
    name: Prettier Check
    runs-on: ubuntu-latest
    env:
      # tell Turbo not to track telemetry
      # https://turborepo.dev/docs/telemetry#how-do-i-opt-out
      DO_NOT_TRACK: 1
      # https://www.prisma.io/docs/orm/reference/environment-variables-reference#prisma_hide_update_message
      PRISMA_HIDE_UPDATE_MESSAGE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js 24 with pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Copy db environment file and set test mode
        run: cd packages/db && cp .env.dist .env && echo -en "\nTEST_MODE=true" >> .env
      - name: Prisma generate
        run: pnpm run generate
      - name: Check formatting and lint
        run: pnpm run format:check
      - name: Comment on PR if formatting issues found
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Code formatting check failed. Please run `pnpm run format:write` locally and commit the changes.'
            })
